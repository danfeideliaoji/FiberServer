upstream fiberserver_backend {
    server fiberserver-app:8080;
    keepalive 256;
    keepalive_requests 10000;
    keepalive_timeout 60s;
}

log_format upstream_timing '$remote_addr - $request '
    'status=$status request_time=$request_time '
    'upstream_status=$upstream_status '
    'upstream_connect_time=$upstream_connect_time '
    'upstream_response_time=$upstream_response_time '
    'upstream_addr=$upstream_addr';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log upstream_timing;

    client_max_body_size 1024m;

    location / {
        proxy_pass http://fiberserver_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/uploadchunk {
        client_body_temp_path /var/data/tmp_uploads/nginx;
        client_body_in_file_only on;

        proxy_pass http://fiberserver_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-File-Path $request_body_file;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /group1/ {
        internal;
        proxy_pass http://fastdfs-storage:8888;
    }
}
