services:
  fiberserver-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: fiberserver-dev:local
    working_dir: /workspace
    environment:
      FIBER_CONFIG: /workspace/docker/config.docker.yml
      FIBER_WORKER_THREADS: ${FIBER_WORKER_THREADS:-5}
      USE_SOCI_DB: ${USE_SOCI_DB:-OFF}
    volumes:
      - .:/workspace
      - ./docker/fdfs/client.conf:/etc/fdfs/client.conf:ro
      - fiberserver-build:/workspace/build
      - fiberserver-tmp:/var/data/tmp_uploads
    depends_on:
      mysql:
        condition: service_healthy
      fastdfs-tracker:
        condition: service_started
      fastdfs-storage:
        condition: service_started
    command: sleep infinity

  fiberserver-app:
    image: fiberserver-dev:local
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      FIBER_CONFIG: /workspace/docker/config.docker.yml
      FIBER_WORKER_THREADS: ${FIBER_WORKER_THREADS:-5}
      USE_SOCI_DB: ${USE_SOCI_DB:-OFF}
    volumes:
      - .:/workspace
      - ./docker/fdfs/client.conf:/etc/fdfs/client.conf:ro
      - fiberserver-build:/workspace/build
      - fiberserver-tmp:/var/data/tmp_uploads
    depends_on:
      mysql:
        condition: service_healthy
      fastdfs-tracker:
        condition: service_started
      fastdfs-storage:
        condition: service_started
    ports:
      - "8080:8080"
    command: >
      bash -lc 'cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DUSE_SOCI_DB=${USE_SOCI_DB:-OFF}
      && cmake --build build -j"$$(nproc)"
      && FIBER_CONFIG=/workspace/docker/config.docker.yml ./build/server_main'

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: fiberserver
      MYSQL_DATABASE: FiberServer
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pfiberserver --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  fastdfs-tracker:
    image: delron/fastdfs
    command: tracker
    ports:
      - "22122:22122"
    volumes:
      - fastdfs-tracker:/var/fdfs

  fastdfs-storage:
    image: delron/fastdfs
    command: storage
    environment:
      TRACKER_SERVER: fastdfs-tracker:22122
    depends_on:
      - fastdfs-tracker
    ports:
      - "23000:23000"
      - "8888:8888"
    volumes:
      - fastdfs-storage:/var/fdfs

  nginx:
    image: nginx:1.25
    depends_on:
      - fiberserver-app
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  fiberserver-build:
  fiberserver-tmp:
  mysql-data:
  fastdfs-tracker:
  fastdfs-storage:
